<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Загрузка статьи... — IdeaNest</title>
  <meta name="description" id="metaDescription" content="">
  <link rel="icon" href="../favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .article-content {
      max-width: 760px;
      margin: 0 auto;
      line-height: 1.78;
      font-size: 1.06rem;
      color: #374151;
    }
    .article-content h1, .article-content h2, .article-content h3 {
      font-weight: 700;
      margin: 2.4em 0 0.9em;
      color: #111827;
      scroll-margin-top: 90px;
    }
    .article-content h1 { font-size: 2.55rem; letter-spacing: -0.045em; }
    .article-content h2 { font-size: 1.95rem; }
    .article-content h3 { font-size: 1.5rem; }
    .article-content p { margin-bottom: 1.5em; }
    .article-content img {
      max-width: 100%;
      border-radius: 14px;
      margin: 2.2em 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .article-content code {
      background: #f3f4f6;
      padding: 3px 7px;
      border-radius: 5px;
      font-size: 0.93em;
    }
    .article-content pre {
      background: #1f2937;
      color: #e5e7eb;
      padding: 1.4em;
      border-radius: 12px;
      overflow-x: auto;
      margin: 2em 0;
    }
    .article-meta {
      color: #6b7280;
      font-size: 0.96rem;
      margin-bottom: 2.8rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
  </style>
</head>
<body>

  <div class="profile-blur-overlay" id="profileBlurOverlay"></div>

  <header class="navbar">
    <div class="navbar-container">
      <a class="brand" href="../index.html">
        <i data-lucide="layers"></i> IdeaNest
      </a>

      <nav class="nav-links">
        <a href="../ideas/all.html" class="nav-link">Идеи</a>
        <a href="../index.html#articles" class="nav-link">Статьи</a>
      </nav>

      <div class="navbar-actions">
        <button class="btn btn-secondary" id="loginBtn" style="display:none;">Войти</button>
        <div class="profile-wrapper" id="profileWrapper" style="display:none;">
          <img src="https://ui-avatars.com/api/?name=User&background=000&color=fff" id="topAvatar" class="avatar-img" alt="Профиль">

          <div class="profile-dropdown" id="profileDropdown">
            <div class="dropdown-header">
              <img src="https://ui-avatars.com/api/?name=User&background=000&color=fff" id="dropdownAvatar" class="dropdown-avatar" alt="Профиль">
              <div class="user-info">
                <span class="user-name" id="userName">Пользователь</span>
                <span class="user-email" id="userEmail">user@ideanest.com</span>
              </div>
            </div>
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item"><i data-lucide="user"></i> Профиль</a>
            <a href="#" class="dropdown-item"><i data-lucide="settings"></i> Настройки</a>
            <a href="#" class="dropdown-item"><i data-lucide="lightbulb"></i> Мои идеи</a>
            <a href="#" class="dropdown-item"><i data-lucide="book-open"></i> Мои статьи</a>
            <a href="#" class="dropdown-item"><i data-lucide="bell"></i> Уведомления</a>
            <div class="dropdown-divider"></div>
            <div class="dropdown-section-title">Аккаунты</div>
            <a href="#" class="dropdown-item active-account"><i data-lucide="check-circle-2"></i> Текущий аккаунт</a>
            <a href="#" class="dropdown-item"><i data-lucide="plus"></i> Добавить аккаунт</a>
            <a href="#" class="dropdown-item"><i data-lucide="refresh-cw"></i> Переключить аккаунт</a>
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item danger" id="logoutBtn"><i data-lucide="log-out"></i> Выйти</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main style="max-width: 820px; margin: 0 auto; padding: 48px 24px 120px;">
    <a href="../index.html#articles" class="btn-text" style="margin-bottom: 32px; display: inline-flex;">
      <i data-lucide="arrow-left"></i> Ко всем статьям
    </a>

    <div id="articleDetailContainer">
      <p style="color: var(--text-muted);">Загрузка статьи...</p>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <div class="modal-backdrop" id="authBackdrop">
    <div class="modal auth-modal">
      <button class="modal-close" id="authCloseBtn" aria-label="Закрыть"><i data-lucide="x"></i></button>
      <div class="auth-tabs" id="authTabs">
        <button class="auth-tab active" data-auth-tab="signin">Вход</button>
        <button class="auth-tab" data-auth-tab="signup">Регистрация</button>
      </div>
      <button type="button" class="auth-reset-back" id="authResetBack" style="display:none;">
        <i data-lucide="arrow-left"></i> Назад ко входу
      </button>
      <form id="authForm">
        <div class="form-group nickname-group" id="usernameGroup">
          <label for="authFullName">Имя</label>
          <input type="text" id="authFullName" placeholder="Александр" autocomplete="name" style="margin-bottom:14px;" />
          <label for="authUsername">Никнейм</label>
          <div class="nickname-input-wrapper">
            <span class="nickname-at">@</span>
            <input type="text" id="authUsername" placeholder="nickname" autocomplete="off" maxlength="15" />
            <span class="nickname-status" id="nicknameStatus"></span>
          </div>
          <div class="nickname-hint" id="nicknameHint">От 5 до 15 символов: латиница в нижнем регистре, цифры, _</div>
        </div>
        <div class="form-group" id="identifierGroup">
          <label for="authEmail" id="authEmailLabel">Email</label>
          <input type="text" id="authEmail" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group" id="passwordGroup">
          <label for="authPassword">Пароль</label>
          <div class="password-input-wrapper">
            <input type="password" id="authPassword" placeholder="Минимум 6 символов" required autocomplete="current-password" />
            <button type="button" class="password-toggle-btn" id="passwordToggleBtn" aria-label="Показать пароль">
              <i data-lucide="eye"></i>
            </button>
          </div>
          <div class="auth-forgot-row" id="authForgotRow">
            <a href="#" id="forgotPasswordLink" class="auth-forgot-link">Забыли пароль?</a>
          </div>
        </div>
        <div class="form-group" id="recoveryPasswordGroup" style="display:none;">
          <label for="recoveryPassword">Новый пароль</label>
          <div class="password-input-wrapper">
            <input type="password" id="recoveryPassword" placeholder="Минимум 6 символов" autocomplete="new-password" />
            <button type="button" class="password-toggle-btn" id="recoveryPasswordToggleBtn" aria-label="Показать пароль">
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>
        <div class="auth-error" id="authError"></div>
        <button type="submit" class="btn btn-primary auth-submit" id="authSubmitBtn">Войти</button>
      </form>
    </div>
  </div>

  <script src="../script.js"></script>
</body>
</html>
