<!DOCTYPE html>
<!--
  ШАБЛОН СТАТЬИ ДЛЯ SEO — ИНСТРУКЦИЯ
  ==================================
  1. Скопируйте этот файл, назовите его например "article-2.html" (или slug-статьи.html).
  2. Замените всё в {{ФИГУРНЫХ СКОБКАХ}} на реальный контент.
  3. Задайте уникальный ARTICLE_ID внизу файла (например: 'article-2' или slug) —
     он используется для комментариев, апвоута и избранного, не должен повторяться.
  4. Если хотите, чтобы статья также появлялась в общем каталоге на главной (articles.json),
     добавьте туда объект с такими же id/title/category.
-->
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Бизнес идеи до 100 тысяч рублей — IdeaHub</title>
  <meta name="description" content="# Бизнес идеи до 100 тысяч рублей" />
  <link rel="canonical" href="https://ideahub.example.com/articles/{{slug}}.html" />

  <meta property="og:title" content="{{Заголовок статьи}}" />
  <meta property="og:description" content="{{Краткое SEO-описание статьи}}" />
  <meta property="og:image" content="{{URL обложки, например https://picsum.photos/800/400?random=N}}" />
  <meta property="og:type" content="article" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{Заголовок статьи}}",
    "description": "{{Краткое SEO-описание статьи}}",
    "image": "{{URL обложки}}",
    "author": { "@type": "Person", "name": "{{Имя автора}}" },
    "publisher": { "@type": "Organization", "name": "IdeaHub" },
    "datePublished": "{{ГГГГ-ММ-ДД}}",
    "dateModified": "{{ГГГГ-ММ-ДД}}"
  }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-articles">

  <div class="gradient-orb orb1"></div><div class="gradient-orb orb2"></div><div class="gradient-orb orb3"></div>
  <div id="toastContainer" class="toast-container"></div>

  <header class="navbar article-header">
    <div class="navbar-container">
      <div class="navbar-left">
        <button class="article-back-btn" onclick="window.location.href='../index.html'" title="К статьям">
          <i data-lucide="arrow-left"></i>
        </button>
      </div>

      <nav class="navbar-glass">
        <div class="navbar-glass-container" style="padding: 0 1rem; color: var(--text-color); font-weight: 600;">
          {{Короткое название для шапки, 2-4 слова}}
        </div>
      </nav>

      <div class="navbar-right">
        <img src="https://ui-avatars.com/api/?name=User&background=00ffcc&color=0b0d10&bold=true" class="nav-avatar" alt="Профиль" onclick="window.location.href='../index.html'">
      </div>
    </div>
  </header>

  <main class="main-content" style="max-width: 800px; margin: 0 auto; padding: 2rem 1rem;">
    <div class="glass-card" style="margin-top: 2rem;">
      <span class="card-badge">{{Категория, например Бизнес / Технологии / Маркетинг}}</span>
      <h1 style="margin-bottom: 0.5rem; font-size: 2rem; line-height: 1.3;">{{Заголовок статьи}}</h1>
      <p style="opacity: 0.6; margin-bottom: 2rem;">{{Имя автора}} · {{N}} мин чтения</p>

      <!-- Основной текст статьи: используйте h2 для подзаголовков, p для абзацев, br между блоками -->
      <div class="article-body-content" style="line-height: 1.8; font-size: 1.05rem; opacity: 0.9;">
        <h2>{{Подзаголовок 1}}</h2>
        <p>{{Текст абзаца}}</p>
        <br>
        <h2>{{Подзаголовок 2}}</h2>
        <p>{{Текст абзаца}}</p>
      </div>

      <div class="article-actions-row">
        <button class="article-action-pill" id="articleUpvoteBtn"><i data-lucide="arrow-up"></i> Апвоут</button>
        <button class="article-action-pill" id="articleFavBtn"><i data-lucide="bookmark"></i> В избранное</button>
      </div>
    </div>

    <div class="glass-card" style="margin-top: 2rem;">
      <div id="commentsSection"></div>
    </div>
  </main>

  <div class="fab-container">
    <button class="fab-btn" id="fabToggleBtn">
      <i data-lucide="bookmark"></i>
    </button>
    <div class="fab-popup glass" id="fabPopup">
      <div class="navbar-glass fab-tabs-wrapper">
        <div class="navbar-tabs" id="fabTabs">
          <div class="nav-indicator" id="fabIndicator"></div>
          <button class="nav-tab active" data-fab-tab="fav-ideas" title="Избранные идеи"><i data-lucide="lightbulb"></i><span>Идеи</span></button>
          <button class="nav-tab" data-fab-tab="up-ideas" title="Лайкнутые идеи"><i data-lucide="arrow-up"></i><span>Лайки</span></button>
          <button class="nav-tab" data-fab-tab="fav-articles" title="Избранные статьи"><i data-lucide="book-open"></i><span>Статьи</span></button>
        </div>
      </div>
      <div class="fab-content-list" id="fabContentList"></div>
    </div>
  </div>

  <script src="../script.js"></script>
  <script>
    // ВАЖНО: замените на уникальный slug/id этой статьи (не должен повторяться на сайте)
    const ARTICLE_ID = '{{slug}}';

    document.addEventListener('DOMContentLoaded', () => {
      const today = new Date().toDateString();
      const upvoteBtn = document.getElementById('articleUpvoteBtn');
      const favBtn = document.getElementById('articleFavBtn');

      if (localStorage.getItem(`upvote_date_${ARTICLE_ID}`) === today) upvoteBtn.classList.add('active');
      const favArticles = JSON.parse(localStorage.getItem('ideahub_fav_articles') || '[]');
      if (favArticles.includes(ARTICLE_ID)) favBtn.classList.add('active');

      upvoteBtn.addEventListener('click', () => {
        const today = new Date().toDateString();
        if (localStorage.getItem(`upvote_date_${ARTICLE_ID}`) === today) {
          showNotification('Вы уже отдавали голос за эту статью сегодня.', 'error');
        } else {
          localStorage.setItem(`upvote_date_${ARTICLE_ID}`, today);
          upvoteBtn.classList.add('active');
          showNotification('Апвоут поставлен!');
        }
      });

      favBtn.addEventListener('click', () => {
        const favs = JSON.parse(localStorage.getItem('ideahub_fav_articles') || '[]');
        const idx = favs.indexOf(ARTICLE_ID);
        if (idx === -1) {
          favs.push(ARTICLE_ID);
          favBtn.classList.add('active');
          showNotification('Статья добавлена в избранное!');
        } else {
          favs.splice(idx, 1);
          favBtn.classList.remove('active');
          showNotification('Статья убрана из избранного');
        }
        localStorage.setItem('ideahub_fav_articles', JSON.stringify(favs));
      });

      if (typeof loadCommentsUI === 'function') loadCommentsUI(ARTICLE_ID);
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
